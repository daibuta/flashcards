<!doctype html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">

<title>Flash Cards</title>

</head>

<body>

<div class="container">

<h1>Flash Cards</h1>

<nav>

<a href="{{ url_for('index') }}">Edit</a>

<a href="{{ url_for('review') }}">Review</a>

</nav>

{% block content %}

{% endblock %}

</div>

<script>
(function() {
  function updateRemembered(cardId, remembered) {
    return fetch('/remembered/' + cardId, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ remembered: remembered }),
    });
  }

  function handleCheckbox(event) {
    var checkbox = event.target;
    if (!checkbox.classList.contains('remembered-checkbox')) {
      return;
    }
    var cardId = checkbox.dataset.cardId;
    if (!cardId) {
      return;
    }
    updateRemembered(cardId, checkbox.checked).catch(function(error) {
      console.error('Unable to save remembered state', error);
      checkbox.checked = !checkbox.checked;
      alert('Could not save remembered state. Please try again.');
    });
  }

  document.addEventListener('change', handleCheckbox);
})();
</script>

</body>

</html>
