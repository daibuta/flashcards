{% extends "base.html" %}

{% block content %}

{% if not card %}

<p>No cards yet.</p>

{% else %}

<div class="review">

{% if side=="front" %}

<p>
<label class="remembered-field">
  <input type="checkbox"
         class="remembered-checkbox"
         data-card-id="{{ card.id }}"
         {% if card.remembered %}checked{% endif %}>
  <!-- Remembered -->
</label>
</p>

<h2>{{ card.front }}</h2>


<p>

<a class="button"
href="{{ url_for('show_back', card_id=card.id) }}">
Flip
</a>

</p>

{% else %}

<!-- <h2>{{ card.front }}</h2>

<hr> -->

<p>
<label class="remembered-field">
  <input type="checkbox"
         class="remembered-checkbox"
         data-card-id="{{ card.id }}"
         {% if card.remembered %}checked{% endif %}>
  <!-- Remembered -->
</label>
</p>

<p>{{ card.definition }}</p>

<hr>

<p>{{ card.notes }}</p>


<p>

<a class="button"
href="{{ url_for('show_front', card_id=card.id) }}">
Front
</a>

</p>

{% endif %}

<p class="align-right">
  <a class="button"
     href="{{ url_for('next_card') }}">
    Next Card
  </a>
</p>

</div>

{% endif %}

{% endblock %}
